syntax = "proto3";

package taskforge.task;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "common.proto";

option go_package = "github.com/taskforge/protos/task";

// Task entity
message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  common.TaskStatus status = 4;
  common.TaskPriority priority = 5;
  string assignee_id = 6;
  string created_by = 7;
  repeated string labels = 8;
  google.protobuf.Timestamp due_date = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  int32 version = 12;
  map<string, string> metadata = 13;
}

// Commands
message CreateTaskCommand {
  string title = 1;
  string description = 2;
  common.TaskPriority priority = 3;
  string assignee_id = 4;
  repeated string labels = 5;
  google.protobuf.Timestamp due_date = 6;
  string created_by = 7;
}

message UpdateTaskCommand {
  string task_id = 1;
  google.protobuf.StringValue title = 2;
  google.protobuf.StringValue description = 3;
  common.TaskStatus status = 4;
  common.TaskPriority priority = 5;
  string assignee_id = 6;
  repeated string labels = 7;
  google.protobuf.Timestamp due_date = 8;
  int32 expected_version = 9;
}

message AssignTaskCommand {
  string task_id = 1;
  string new_assignee_id = 2;
  int32 expected_version = 3;
}

message DeleteTaskCommand {
  string task_id = 1;
  int32 expected_version = 2;
}

// Queries
message GetTaskRequest {
  string task_id = 1;
}

message ListTasksRequest {
  common.PaginationRequest pagination = 1;
  common.TaskStatus filter_status = 2;
  common.TaskPriority filter_priority = 3;
  string filter_assignee_id = 4;
  repeated string filter_labels = 5;
  google.protobuf.Timestamp due_before = 6;
  google.protobuf.Timestamp due_after = 7;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  common.PaginationResponse pagination = 2;
}

message GetTaskHistoryRequest {
  string task_id = 1;
}

message TaskEvent {
  string event_id = 1;
  string task_id = 2;
  string event_type = 3;
  bytes event_data = 4;
  int32 version = 5;
  string user_id = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message GetTaskHistoryResponse {
  repeated TaskEvent events = 1;
}

// Task Service
service TaskService {
  // Commands
  rpc CreateTask(CreateTaskCommand) returns (Task);
  rpc UpdateTask(UpdateTaskCommand) returns (Task);
  rpc AssignTask(AssignTaskCommand) returns (Task);
  rpc DeleteTask(DeleteTaskCommand) returns (google.protobuf.BoolValue);
  
  // Queries
  rpc GetTask(GetTaskRequest) returns (Task);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc GetTaskHistory(GetTaskHistoryRequest) returns (GetTaskHistoryResponse);
  
  // Stream
  rpc WatchTaskEvents(GetTaskRequest) returns (stream TaskEvent);
}